{% extends "base.html" %}
{% block title %}Record Payment{% endblock %}
{% block content %}
<h3 class="mb-4">Record Fee Payment</h3>
<div class="card p-4" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Student</label>{{ form.student }}</div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label">Term</label>{{ form.term }}</div>
            <div class="col-md-6 mb-3"><label class="form-label">Year</label>{{ form.year }}</div>
        </div>
        <div class="mb-3"><label class="form-label">Amount</label>{{ form.amount }}</div>
        <div class="mb-3"><label class="form-label">Payment Method</label>{{ form.method }}</div>
        <div class="mb-3"><label class="form-label">Reference (optional)</label>{{ form.reference }}</div>
        <button type="submit" class="btn btn-primary">Save Payment</button>
        <a href="{% url 'fees:bursar_dashboard' %}" class="btn btn-link">Cancel</a>
    </form>
</div>
{% endblock %}

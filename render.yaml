services:
  - type: web
    name: primary-school-management-system
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn school_system.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DATABASE_URL
        fromDatabase:
          name: primary-school-db
          property: connectionString

databases:
  - name: primary-school-db
    plan: free